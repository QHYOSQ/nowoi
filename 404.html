<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Page not found –nowoi</title>
<meta name="description" content="The page you are looking for does not exist." />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>
  <div class="container">
    <header class="site-header">
      <div class="header-row">
        <a href="./index.html" class="brand">nowoi.com</a>
        <nav class="nav">
          <a href="./index.html">Home</a>
          <a href="./tools/index.html">Tools</a>
          <a href="./about.html">About</a>
          <a href="./contact.html">Contact</a>
        </nav>
      </div>
    </header>

    <div class="page-head">
      <h1>404 –Page not found</h1>
      <p>The page you are looking for does not exist.</p>
    </div>

    <div class="content">
      <p>Try going back to the homepage or explore our tools.</p>
      <button onclick="window.location.href='./index.html'">Go to Home</button>
      <button class="alt" onclick="window.location.href='./tools/index.html'">Explore Tools</button>
    </div>

    <footer class="footer">
      <p>© <span id="year">2026</span> nowoi.com –Free Online Tools</p>
      <div class="footer-links">
        <a href="./index.html">Home</a>
        <a href="./tools/index.html">Tools</a>
        <a href="./about.html">About</a>
        <a href="./privacy-policy.html">Privacy Policy</a>
        <a href="./terms.html">Terms</a>
        <a href="./contact.html">Contact</a>
      </div>
    </footer>
  </div>

<script>
  // Try to get network time from HTTP header, fallback to local time
  async function updateYear() {
    try {
      const response = await fetch(window.location.href, { method: 'HEAD', cache: 'no-store' });
      const dateHeader = response.headers.get('date');
      if (dateHeader) {
        const serverDate = new Date(dateHeader);
        document.getElementById('year').textContent = serverDate.getFullYear();
      } else {
        document.getElementById('year').textContent = new Date().getFullYear();
      }
    } catch (e) {
      document.getElementById('year').textContent = new Date().getFullYear();
    }
  }
  updateYear();
</script>
<script src="./assets/js/common.js"></script>
</body>
</html>
